<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kodiqa Social Preview</title>
<!-- Open in browser, screenshot at 1280x640, upload via GitHub Settings > Social preview -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 640px;
    background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #2d1b69 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: white;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
    pointer-events: none;
  }
  .title {
    font-size: 80px;
    font-weight: 800;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #7C3AED, #06B6D4, #10B981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -2px;
  }
  .tagline {
    font-size: 24px;
    color: #c0c0e0;
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 18px;
    color: #8080a0;
    margin-bottom: 40px;
    text-align: center;
    max-width: 800px;
  }
  .badges {
    display: flex;
    gap: 16px;
  }
  .badge {
    padding: 10px 24px;
    border-radius: 24px;
    font-size: 16px;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
  }
  .badge.purple { border-color: rgba(124, 58, 237, 0.4); }
  .badge.cyan { border-color: rgba(6, 182, 212, 0.4); }
  .badge.green { border-color: rgba(16, 185, 129, 0.4); }
  .badge.blue { border-color: rgba(59, 130, 246, 0.4); }
</style>
</head>
<body>
  <div class="title">Kodiqa</div>
  <div class="tagline">One agent. Every model. Zero limits.</div>
  <div class="subtitle">The AI coding agent that runs anywhere — free locally with Ollama, or supercharged by 7 cloud APIs</div>
  <div class="badges">
    <div class="badge purple">7 Providers</div>
    <div class="badge cyan">26 Tools</div>
    <div class="badge green">69 Commands</div>
    <div class="badge blue">Python 3.9+</div>
  </div>
</body>
</html>

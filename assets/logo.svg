<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- Main gradient - electric purple to cyan -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <!-- Icon gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#7C3AED" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect x="0" y="0" width="800" height="200" rx="16" fill="#0F172A"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#06B6D4" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Decorative circuit lines -->
  <g stroke="#7C3AED" stroke-width="1" opacity="0.15" fill="none">
    <path d="M 30 30 L 80 30 L 80 60"/>
    <path d="M 770 170 L 720 170 L 720 140"/>
    <path d="M 30 170 L 60 170 L 60 150 L 90 150"/>
    <path d="M 770 30 L 740 30 L 740 50 L 710 50"/>
    <circle cx="80" cy="60" r="3" fill="#7C3AED"/>
    <circle cx="720" cy="140" r="3" fill="#7C3AED"/>
    <circle cx="90" cy="150" r="3" fill="#06B6D4"/>
    <circle cx="710" cy="50" r="3" fill="#06B6D4"/>
  </g>

  <!-- Logo icon - terminal/brain hybrid -->
  <g transform="translate(60, 40)" filter="url(#shadow)">
    <!-- Hexagonal frame -->
    <polygon points="60,2 108,28 108,82 60,108 12,82 12,28" fill="none" stroke="url(#iconGrad)" stroke-width="2.5" opacity="0.8"/>

    <!-- Inner terminal window -->
    <rect x="24" y="24" width="72" height="62" rx="6" fill="#1E293B" stroke="url(#iconGrad)" stroke-width="1.5"/>

    <!-- Terminal top bar -->
    <rect x="24" y="24" width="72" height="14" rx="6" fill="#1E293B"/>
    <rect x="24" y="32" width="72" height="6" fill="#1E293B"/>
    <circle cx="34" cy="31" r="2.5" fill="#EF4444" opacity="0.8"/>
    <circle cx="43" cy="31" r="2.5" fill="#F59E0B" opacity="0.8"/>
    <circle cx="52" cy="31" r="2.5" fill="#10B981" opacity="0.8"/>

    <!-- Terminal cursor prompt -->
    <text x="32" y="54" font-family="monospace" font-size="14" font-weight="bold" fill="#06B6D4">❯</text>
    <rect x="46" y="44" width="8" height="13" rx="1" fill="#A78BFA" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- AI brain dots/nodes -->
    <circle cx="36" cy="70" r="2" fill="#7C3AED" opacity="0.7"/>
    <circle cx="50" cy="74" r="2" fill="#06B6D4" opacity="0.7"/>
    <circle cx="64" cy="68" r="2" fill="#10B981" opacity="0.7"/>
    <circle cx="78" cy="73" r="2" fill="#A78BFA" opacity="0.7"/>
    <line x1="36" y1="70" x2="50" y2="74" stroke="#7C3AED" stroke-width="0.8" opacity="0.4"/>
    <line x1="50" y1="74" x2="64" y2="68" stroke="#06B6D4" stroke-width="0.8" opacity="0.4"/>
    <line x1="64" y1="68" x2="78" y2="73" stroke="#10B981" stroke-width="0.8" opacity="0.4"/>
    <line x1="36" y1="70" x2="64" y2="68" stroke="#A78BFA" stroke-width="0.5" opacity="0.3"/>

    <!-- Orbiting particles -->
    <circle r="2.5" fill="#06B6D4" opacity="0.6">
      <animateMotion dur="4s" repeatCount="indefinite" path="M 60,0 A 60,55 0 1 1 59.9,0"/>
    </circle>
    <circle r="2" fill="#7C3AED" opacity="0.5">
      <animateMotion dur="6s" repeatCount="indefinite" path="M -60,0 A 60,55 0 1 0 -59.9,0"/>
    </circle>
  </g>

  <!-- KODIQA text -->
  <g filter="url(#shadow)">
    <text x="210" y="118" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="8" fill="url(#mainGrad)">KODIQA</text>
  </g>

  <!-- Tagline -->
  <text x="215" y="152" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="14" letter-spacing="3" fill="#94A3B8">AI CODING AGENT</text>

  <!-- Accent dots under tagline -->
  <circle cx="215" cy="172" r="2.5" fill="#7C3AED" opacity="0.6"/>
  <circle cx="230" cy="172" r="2.5" fill="#06B6D4" opacity="0.6"/>
  <circle cx="245" cy="172" r="2.5" fill="#10B981" opacity="0.6"/>

  <!-- Floating sparkle particles -->
  <g opacity="0.4">
    <circle cx="650" cy="45" r="1.5" fill="#A78BFA">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="80" r="1" fill="#06B6D4">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="730" cy="120" r="1.5" fill="#10B981">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="155" r="1" fill="#7C3AED">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="60" r="1" fill="#F59E0B">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>

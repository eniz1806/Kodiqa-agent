<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="termBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#7C3AED" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#06B6D4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Subtle radial glow in center -->
  <circle cx="128" cy="128" r="100" fill="#7C3AED" opacity="0.05"/>

  <!-- Hexagonal frame -->
  <g transform="translate(128, 118)" filter="url(#glow)">
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.5"/>
  </g>

  <!-- Terminal window -->
  <g transform="translate(48, 50)" filter="url(#innerGlow)">
    <rect x="0" y="0" width="160" height="120" rx="12" fill="#1E293B" stroke="url(#termBorder)" stroke-width="2"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="160" height="28" rx="12" fill="#1E293B"/>
    <rect x="0" y="16" width="160" height="12" fill="#1E293B"/>
    <circle cx="18" cy="14" r="4.5" fill="#EF4444" opacity="0.85"/>
    <circle cx="33" cy="14" r="4.5" fill="#F59E0B" opacity="0.85"/>
    <circle cx="48" cy="14" r="4.5" fill="#10B981" opacity="0.85"/>

    <!-- Terminal content -->
    <!-- Prompt line 1 -->
    <text x="14" y="52" font-family="monospace" font-size="20" font-weight="bold" fill="#06B6D4">❯</text>
    <rect x="34" y="38" width="60" height="3" rx="1.5" fill="#94A3B8" opacity="0.3"/>

    <!-- Prompt line 2 -->
    <text x="14" y="76" font-family="monospace" font-size="20" font-weight="bold" fill="#7C3AED">❯</text>
    <rect x="34" y="62" width="90" height="3" rx="1.5" fill="#94A3B8" opacity="0.2"/>

    <!-- Active cursor line -->
    <text x="14" y="100" font-family="monospace" font-size="20" font-weight="bold" fill="#10B981">❯</text>
    <rect x="34" y="88" width="14" height="17" rx="2" fill="#A78BFA" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.25;0.85" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- Neural network nodes -->
    <circle cx="100" cy="50" r="3" fill="#7C3AED" opacity="0.5"/>
    <circle cx="125" cy="42" r="2.5" fill="#06B6D4" opacity="0.5"/>
    <circle cx="140" cy="55" r="2" fill="#10B981" opacity="0.5"/>
    <circle cx="115" cy="65" r="2.5" fill="#A78BFA" opacity="0.4"/>
    <circle cx="135" cy="75" r="3" fill="#06B6D4" opacity="0.4"/>
    <line x1="100" y1="50" x2="125" y2="42" stroke="#7C3AED" stroke-width="0.8" opacity="0.3"/>
    <line x1="125" y1="42" x2="140" y2="55" stroke="#06B6D4" stroke-width="0.8" opacity="0.3"/>
    <line x1="115" y1="65" x2="135" y2="75" stroke="#A78BFA" stroke-width="0.8" opacity="0.3"/>
    <line x1="100" y1="50" x2="115" y2="65" stroke="#7C3AED" stroke-width="0.6" opacity="0.2"/>
    <line x1="140" y1="55" x2="135" y2="75" stroke="#10B981" stroke-width="0.6" opacity="0.2"/>
  </g>

  <!-- K letter accent at bottom -->
  <text x="128" y="220" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="32" font-weight="800" letter-spacing="6" fill="url(#accent)">KODIQA</text>

  <!-- Corner sparkles -->
  <circle cx="30" cy="30" r="2" fill="#A78BFA" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="226" cy="30" r="1.5" fill="#06B6D4" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="226" cy="226" r="2" fill="#10B981" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting particle -->
  <circle r="3" fill="#06B6D4" opacity="0.4">
    <animateMotion dur="5s" repeatCount="indefinite" path="M 128,38 A 90,80 0 1 1 127.9,38"/>
  </circle>
</svg>

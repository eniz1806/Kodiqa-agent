name: Bug Report
description: Report a bug in Kodiqa
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the details below.
  - type: input
    id: version
    attributes:
      label: Kodiqa Version
      description: "Run `kodiqa --version` or check pyproject.toml"
      placeholder: "3.2.0"
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      description: Which API provider were you using?
      options:
        - Ollama (local)
        - Claude API
        - OpenAI API
        - DeepSeek API
        - Groq API
        - Mistral API
        - Qwen API
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model
      description: Which model were you using?
      placeholder: "e.g., qwen3-coder, claude-sonnet-4-6, llama3.3"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug.
      placeholder: |
        1. Run `kodiqa`
        2. Type `...`
        3. See error
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Windows (WSL)
        - Other
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.9, 3.10, 3.11, 3.12"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: "Paste any error messages or relevant output from `~/.kodiqa/error.log`."
      render: shell
